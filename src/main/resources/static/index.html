<!DOCTYPE html>
<html lang="de">
<head>
    <title>Bildanalyse mit Ollama</title>
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="bildanalyse.css">
</head>
<body>

  <h1>Bildanalyse mit Ollama</h1>

  <form method="POST" enctype="multipart/form-data" action="app/bild">

      <input type="file" name="bild" accept="image/jpeg">
      <br><br>

      <input type="submit" value="Hochladen">
      <input type="reset"  value="Zurücksetzen">

  </form>
  <br>

  <p>Es werden nur JPEG-Bilder unterstützt.</p>

  <script src="index.js"></script>

</body>
