<!DOCTYPE html>
<html lang="de">
<head>
    <title>Bildanalyse mit Ollama: Tiere suchen</title>
    <meta charset="utf-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="bildanalyse.css">
</head>
<body>

  <h1>Bildanalyse mit Ollama: Tiere suchen</h1>

  <form id="bildUploadForm">
    <label for="bildInput">Bild auswählen (nur JPEG):</label>
    <input id="bildInput" name="bild" type="file" accept="image/jpeg,.jpg,.jpeg" required>
    <br><br>
    <button id="uploadButton" type="submit">Bild analysieren</button>
    <button id="resetButton"  type="button" >Zurücksetzen</button>
  </form>

  <br><br>

  <div id="divWartezeit"></div>
  <div id="divErgebnis"></div>

  <br><br>

  <img id="bild" alt="Hochgeladenes Bild">

  <script src="index.js"></script>

</body>
